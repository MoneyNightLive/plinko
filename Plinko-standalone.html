  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

dial-gradient(circle at 20% 0%, #2a1440 0%, #1b1024 60%);padding:{{ outerPadding }};box-sizing:border-box;display:flex;flex-direction:column;gap:20px;align-items:center;\">\n\n  <sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;max-width:380px;margin:8vh auto;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:14px;align-items:center;\">\n      <div style=\"width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#ffd23f,#ff6fb0);display:flex;align-items:center;justify-content:center;font:700 22px 'Fredoka',sans-serif;color:#1b1024;\">P<\u002Fdiv>\n      <div style=\"font:700 24px 'Fredoka',sans-serif;color:#fff;white-space:nowrap;\">Plinko Drop<\u002Fdiv>\n      <div style=\"font:700 12px 'Nunito',sans-serif;color:rgba(255,255,255,0.45);\">Log in to play<\u002Fdiv>\n      <input type=\"text\" placeholder=\"Account name\" value=\"{{ loginName }}\" sc-camel-on-change=\"{{ onLoginNameChange }}\" style=\"width:100%;box-sizing:border-box;background:rgba(0,0,0,0.35);border:none;outline:none;border-radius:12px;padding:12px 14px;font:700 14px 'Nunito',sans-serif;color:#fff;\">\n      <input type=\"password\" placeholder=\"Password\" value=\"{{ loginPassword }}\" sc-camel-on-change=\"{{ onLoginPasswordChange }}\" style=\"width:100%;box-sizing:border-box;background:rgba(0,0,0,0.35);border:none;outline:none;border-radius:12px;padding:12px 14px;font:700 14px 'Nunito',sans-serif;color:#fff;\">\n      <sc-if value=\"{{ hasLoginError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font:700 12px 'Nunito',sans-serif;color:#ff8fa8;\">{{ loginError }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div sc-camel-on-click=\"{{ doLogin }}\" style=\"width:100%;box-sizing:border-box;text-align:center;padding:14px;border-radius:14px;font:700 16px 'Fredoka',sans-serif;cursor:pointer;background:linear-gradient(135deg,#ff6fb0,#7c5cff);color:#fff;user-select:none;\">Log In<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showGame }}\" hint-placeholder-val=\"{{ false }}\">\n\n  <div style=\"width:100%;max-width:1360px;display:flex;flex-direction:{{ headerDir }};align-items:{{ headerAlign }};justify-content:space-between;gap:16px;\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <a href=\"https://www.moneynightlive.com/home\" target=\"_top\" style=\"width:44px;height:44px;flex:none;border-radius:14px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font:700 20px 'Fredoka',sans-serif;color:#fff;text-decoration:none;\">⌂<\u002Fa>\n      <div style=\"width:44px;height:44px;flex:none;border-radius:14px;background:linear-gradient(135deg,#ffd23f,#ff6fb0);display:flex;align-items:center;justify-content:center;font:700 20px 'Fredoka',sans-serif;color:#1b1024;box-shadow:0 4px 0 rgba(0,0,0,0.25);\">P<\u002Fdiv>\n      <div style=\"font:700 28px 'Fredoka',sans-serif;color:#fff;letter-spacing:0.5px;\">Plinko Drop<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px;width:{{ pillWidth }};justify-content:{{ pillJustify }};background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:16px;padding:10px 18px;box-sizing:border-box;flex-wrap:wrap;\">\n      <div style=\"font:700 14px 'Fredoka',sans-serif;color:#fff;\">{{ currentUsername }}<\u002Fdiv>\n      <div style=\"font:700 11px 'Nunito',sans-serif;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.08em;\">Balance<\u002Fdiv>\n      <div style=\"font:700 22px 'Fredoka',sans-serif;color:#ffd23f;\">🪙{{ balanceDisplay }}<\u002Fdiv>\n      <div sc-camel-on-click=\"{{ openPwModal }}\" style=\"font:700 12px 'Nunito',sans-serif;color:rgba(255,255,255,0.45);cursor:pointer;border-left:2px solid rgba(255,255,255,0.15);padding-left:10px;\">Password<\u002Fdiv>\n ;border-radius:12px;padding:12px 14px;font:700 14px 'Nunito',sans-serif;color:#fff;\">\n        <sc-if value=\"{{ hasPwMsg }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font:700 12px 'Nunito',sans-serif;color:{{ pwMsgColor }};\">{{ pwMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;justify-content:flex-end;margin-top:4px;\">\n          <div sc-camel-on-click=\"{{ closePwModal }}\" style=\"padding:10px 18px;border-radius:10px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);font:700 13px 'Nunito',sans-serif;cursor:pointer;user-select:none;\">{{ pwCancelLabel }}<\u002Fdiv>\n          <div sc-camel-on-click=\"{{ submitPwChange }}\" style=\"padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#ff6fb0,#7c5cff);color:#fff;font:700 13px 'Fredoka',sans-serif;cursor:pointer;user-select:none;\">Save<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"width:100%;max-width:1360px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:10px 18px;overflow-x:auto;\">\n    <div style=\"font:700 11px 'Nunito',sans-serif;color:#ffd23f;text-transform:uppercase;letter-spacing:0.08em;flex:none;\">🏆 Top Players<\u002Fdiv>\n    <sc-if value=\"{{ leaderboardEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font:600 12px 'Nunito',sans-serif;color:rgba(255,255,255,0.4);\">No plays yet — be the first!<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-for list=\"{{ leaderboard }}\" as=\"lb\" hint-placeholder-count=\"0\">\n      <div style=\"flex:none;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border-radius:10px;padding:5px 12px;\">\n        <div style=\"font:700 12px 'Fredoka',sans-serif;color:rgba(255,255,255,0.5);\">#{{ lb.rank }}<\u002Fdiv>\n        <div style=\"font:700 13px 'Fredoka',sans-serif;color:#fff;\">{{ lb.username }}<\u00 : {&quot;width&quot;: 1400, &quot;height&quot;: 1000}, &quot;defaultRows&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 12, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 8, &quot;max&quot;: 20, &quot;step&quot;: 2, &quot;section&quot;: &quot;Setup&quot;}, &quot;soundEnabledDefault&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Setup&quot;}, &quot;colorTheme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;neon&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;candy&quot;, &quot;neon&quot;, &quot;sunset&quot;], &quot;section&quot;: &quot;Style&quot;}}\">\nconst THEMES = {\n  candy: { bgTop:'#3a1450', bgBottom:'#160722', peg:'#ffffff', pegGlow:'rgba(255,255,255,0.55)', divider:'#ffffff', ballColors:['#ffd23f','#ff6fb0','#4fd8ff','#7c5cff','#5cff9d'], text:'#ffffff' },\n  neon: { bgTop:'#0d0221', bgBottom:'#050110', peg:'#00f0ff', pegGlow:'rgba(0,240,255,0.55)', divider:'#ff00e5', ballColors:['#00f0ff','#ff00e5','#faff00','#00ff85','#ff6fb0'], text:'#e6faff' },\n  sunset: { bgTop:'#7a1c46', bgBottom:'#2a0a20', peg:'#ffd23f', pegGlow:'rgba(255,210,63,0.55)', divider:'#ff7a3c', ballColors:['#ffffff','#ffd23f','#ff7a3c','#ff3c6f','#ffb37a'], text:'#fff3e6' }\n};\n\nfunction niceRound(v){\n  if (v < 1) return Math.round(v * 10) / 10;\n  if (v < 10) return Math.round(v * 10) / 10;\n  if (v < 100) return Math.round(v);\n  return Math.round(v / 5) * 5;\n}\n\nconst BASE_CURVE = [0.2, 0.2, 0.3, 0.5, 1.3, 1.5, 3.5, 8];\nconst RISK_SCALE = { low: 0.5, medium: 1, high: 2.2 };\nconst HIGH_RISK_12 = [8, 4, 1.5, 1.2, 0.8, 0.6, 0.4, 0.6, 0.8, 1.2, 1.5, 4, 8];\n\nfunction getMultipliers(rows, risk){\n  if (rows === 12 && risk === 'high') return HIGH_RISK_12.slice();\n  const buckets = rows + 1;\n  const mid = (buckets - 1) / 2;\n  const scale = RISK_SCALE[risk] ?? 1;\n  const last = BASE_CURVE.length - 1;\n  const arr = [];\n  for (let i = 0; i < buckets; i++){\n    const d = mid === 0 ? 0 : Math.abs(i - mid) / mid;\n    const pos = d * last;\n    const lo = Math.floor(pos), hi = Math.ceil(pos);\n    const t = pos - lo;\n    const base = BASE_CURVE[lo] + (BASE_CURVE[hi] - BASE_CURVE[lo]) * t;\n    let rounded = niceRound(base * scale);\n    if (rounded === 3.2) rounded = 4;\n    if (rounded === 1.4) rounded = 1.7;\n    if (rounded === 0.9) rounded = 1;\n    if (rounded === 1) rounded = 1.4;\n    if (rounded === 0.4) rounded = 0.8;\n    if (rounded === 0.2 && d > 0) rounded = 0.6;\n    if (rounded === 0.2 && d === 0) rounded = 0.4;\n    arr.push(rounded);\n  }\n  return arr;\n}\n\nconst SUPABASE_URL = 'https://jqacptprwypmarezeiwn.supabase.co';\nconst SUPABASE_ANON_KEY = 'sb_publishable_RRgYuW3hdknSD9l_AC1-2w_qmFkAYQl';\nlet _sbClient = null;\nfunction getSb(){\n  if (!_sbClient) _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);\n  return _sbClient;\n}\nconst sb = new Proxy({}, { get(_, prop){ return (...args) => getSb()[prop](...args); } });\nconst SESSION_KEY = 'plinko_session';\n\nfunction readSession(){\n  try { return localStorage.getItem(SESSION_KEY) || null; } catch (e) { return null; }\n}\nfunction writeSession(id){\n  try { id ? localStorage.setItem(SESSION_KEY, id) : localStorage.removeItem(SESSION_KEY); } catch (e) {}\n}\n\nfunction multColor(m){\n  if (m >= 8) return '#e8963c';\n  if (m >= 1.2) return '#e8c23c';\n  return '#8a7fb0';\n}\n\nclass Component extends DCLogic {\n  canvasRef = React.createRef();\n  balls = [];\n  pegs = [];\n  dividerXs = [];\n  flashes = {};\n  pegFlashes = new Map();\n  lastTick = 0;\n\n  state = {\n    account: null,\n    sessionId: readSession(),\n    loginName: '',\n    loginPassword: '',\n    loginError: '',\n    betAmount: 10,\n    risk: 'high',\n    rows: (this.props.defaultRows ?? 12),\n    ballCount: 1,\n    soundVolume: (this.props.soundEnabledDefault ?? true) ? 1 : 0,\n    history: [],\n    theme: (this.props.colorTheme ?? 'neon'),\n    leaderboard: [],\n    isMobile: (typeof window !== 'undefined' && window.innerWidth < 720)\n  };\n\n  onResize = () => {\n    const m = window.innerWidth < 720;\n    if (m !== this.state.isMobile) this.setState({ isMobile: m });\n  };\n\n  refreshLeaderboard = async () => {\n    const { data, error } = await sb.rpc('get_leaderboard', { p_limit: 5 });\n    if (error) return;\n    this.setState({ leaderboard: data || [] });\n  };\n\n  setTheme = (t) => this.setState({ theme: t });\n\n  getCurrentAccount(){\n    return this.state.account;\n  }\n\n  restoreSession = async () => {\n    const id = this.state.sessionId;\n    if (!id) return;\n    const { data, error } = await sb.rpc('player_get_state', { p_account_id: id });\n    if (error || !data){ writeSession(null); this.setState({ sessionId: null, account: null }); return; }\n    this.setState({ account: { id: data.id, name: data.username, balance: data.balance } });\n  };\n\n  doLogin = async () => {\n    const name = (this.state.loginName || '').trim();\n    const pass = this.state.loginPassword || '';\n    const { data, error } = await sb.rpc('player_login', { p_username: name, p_password: pass });\n    if (error || !data){\n      const frozen = error && /frozen/i.test(error.message || '');\n      this.setState({ loginError: frozen ? 'This account is frozen — contact the admin' : 'Invalid account name or password' });\n      return;\n    }\n    writeSession(data.id);\n    if (this.wixMember) sb.rpc('link_wix_account', { p_account_id: data.id, p_password: pass, p_wix_id: this.wixMember.id });\n    const mustChange = !!data.must_change_password;\n    if (mustChange) this.setState({ pwModal: true, pwForced: true, pwOld: pass, pwNew: '', pwMsg: '' });\n    this.setState({ sessionId: data.id, account: { id: data.id, name: data.username, balance: data.balance }, loginName: '', loginPassword: '', loginError: '' });\n  };\n\n  openPwModal = () => this.setState({ pwModal: true, pwForced: false, pwOld: '', pwNew: '', pwMsg: '', pwMsgOk: false });\n  closePwModal = () => this.setState({ pwModal: false, pwForced: false });\n  onPwOldChange = (e) => this.setState({ pwOld: e.target.value, pwMsg: '' });\n  onPwNewChange = (e) => this.setState({ pwNew: e.target.value, pwMsg: '' });\n  submitPwChange = async () => {\n    const acc = this.getCurrentAccount();\n    if (!acc) return;\n    const oldPw = this.state.pwOld || '';\n    const newPw = this.state.pwNew || '';\n    if (newPw.length < 4){ this.setState({ pwMsg: 'New password must be at least 4 characters', pwMsgOk: false }); return; }\n    const { error } = await sb.rpc('player_change_password', { p_account_id: acc.id, p_old_password: oldPw, p_new_password: newPw });\n    if (error){ this.setState({ pwMsg: 'Current password is incorrect', pwMsgOk: false }); return; }\n    this.setState({ pwMsg: 'Password changed!', pwMsgOk: true, pwOld: '', pwNew: '' });\n    setTimeout(() => this.setState({ pwModal: false }), 1200);\n  };\n\n  doLogout = () => {\n    writeSession(null);\n    this.setState({ sessionId: null, account: null });\n  };\n\n  onLoginNameChange = (e) => this.setState({ loginName: e.target.value, loginError: '' });\n  onLoginPasswordChange = (e) => this.setState({ loginPassword: e.target.value, loginError: '' });\n\n  componentDidMount(){\n    this.rebuildBoard();\n    this.raf = requestAnimationFrame(this.loop);\n    window.addEventListener('resize', this.onResize);\n    this.restoreSession();\n    this.refreshLeaderboard();\n    this.lbInterval = setInterval(this.refreshLeaderboard, 15000);\n    window.addEventListener('message', this.handleWixMessage);\n    try { if (window.parent !== window) window.parent.postMessage('game-ready', '*'); } catch (e) {}\n  }\n  componentWillUnmount(){\n    cancelAnimationFrame(this.raf);\n    clearInterval(this.lbInterval);\n    window.removeEventListener('resize', this.onResize);\n    window.removeEventListener('message', this.handleWixMessage);\n  }\n\n  handleWixMessage = (e) => {\n    const d = e.data;\n    if (!d || d.type !== 'wix-member' || !d.wixId) return;\n    this.wixMember = { id: String(d.wixId), nickname: String(d.nickname || 'Player') };\n    if (!this.state.sessionId && !this.state.account && !this.wixTried){\n      this.wixTried = true;\n      this.wixLogin();\n    }\n  };\n\n  wixLogin = async () => {\n    const w = this.wixMember;\n    if (!w) return;\n    const { data, error } = await sb.rpc('wix_login', { p_wix_id: w.id, p_nickname: w.nickname });\n    if (error || !data){\n      if (error && /frozen/i.test(error.message || '')) this.setState({ loginError: 'This account is frozen — contact the admin' });\n      return;\n    }\n    writeSession(data.id);\n    this.setState({ sessionId: data.id, account: { id: data.id, name: data.username, balance: data.balance }, loginError: '' });\n  };\n  componentDidUpdate(prevProps, prevState){\n    if (prevState.rows !== this.state.rows || prevState.risk !== this.state.risk){\n      this.rebuildBoard();\n      this.balls = [];\n    }\n  }\n\n  theme(){\n    const key = this.state.theme ?? 'neon';\n    return THEMES[key] || THEMES.neon;\n  }\n\n  rebuildBoard = () => {\n    const canvas = this.canvasRef.current;\n    if (!canvas || !canvas.width || !canvas.height) return;\n    this.width = canvas.width;\n    this.height = canvas.height;\n    const rows = this.state.rows;\n    this.multipliers = getMultipliers(rows, this.state.risk);\n    const buckets = rows + 1;\n    this.bucketTopY = this.height * 0.74;\n    this.bucketWidth = this.width / buckets;\n    this.bucketBounds = [];\n    for (let k = 0; k <= buckets; k++) this.bucketBounds.push(k * this.bucketWidth);\n    this.dividerXs = this.bucketBounds.slice(1, -1);\n\n    const pegAreaTop = 46;\n    const pegAreaHeight = this.bucketTopY - pegAreaTop - 20;\n    const rowSpacing = pegAreaHeight / rows;\n    const cols = rows + 1;\n    const colSpacing = this.width / (cols + 1);\n    this.pegs = [];\n    for (let i = 0; i < rows; i++){\n      const y = pegAreaTop + rowSpacing * (i + 1);\n      if (i % 2 === 0){\n        for (let j = 0; j < cols; j++){\n          this.pegs.push({ x: colSpacing * (j + 1), y, r: Math.max(3, colSpacing * 0.11) });\n        }\n      } else {\n        for (let j = 0; j < cols - 1; j++){\n          this.pegs.push({ x: colSpacing * (j + 1.5), y, r: Math.max(3, colSpacing * 0.11) });\n        }\n      }\n    }\n    this.ballRadius = Math.max(5, colSpacing * 0.22);\n  };\n\n  ensureAudio(){\n    if (!this._actx){\n      const Ctx = window.AudioContext || window.webkitAudioContext;\n      if (Ctx) this._actx = new Ctx();\n    }\n  }\n\n  playTone(freq, duration, vol, type){\n    if (!this.state.soundVolume || !this._actx) return;\n    const ctx = this._actx;\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    osc.type = type || 'sine';\n    osc.frequency.value = freq;\n    const now = ctx.currentTime;\n    gain.gain.setValueAtTime(vol * this.state.soundVolume, now);\n    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);\n    osc.connect(gain);\n    gain.connect(ctx.destination);\n    osc.start(now);\n    osc.stop(now + duration);\n  }\n\n  pegTick(){\n    const now = performance.now();\n    if (now - this.lastTick < 28) return;\n    this.lastTick = now;\n    this.playTone(680 + Math.random() * 260, 0.05, 0.045, 'sine');\n  }\n\n  playCoinDrop(big){\n    if (!this.state.soundVolume || !this._actx) return;\n    const ctx = this._actx;\n    const now = ctx.currentTime;\n    const notes = big ? [1400, 1760, 2100] : [900, 1100];\n    notes.forEach((freq, i) => {\n      const osc = ctx.createOscillator();\n      const gain = ctx.createGain();\n      osc.type = 'sine';\n      osc.frequency.value = freq;\n      const start = now + i * 0.05;\n      gain.gain.setValueAtTime(0.0001, start);\n      gain.gain.linearRampToValueAtTime((big ? 0.12 : 0.07) * this.state.soundVolume, start + 0.01);\n      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.35);\n      osc.connect(gain);\n      gain.connect(ctx.destination);\n      osc.start(start);\n      osc.stop(start + 0.4);\n    });\n  }\n\n  landSound(mult){\n    const big = mult >= 5;\n    this.playCoinDrop(big);\n  }\n\n  pickBallColor(){\n    const colors = this.theme().ballColors;\n    return colors[Math.floor(Math.random() * colors.length)];\n  }\n\n  dropBalls = async () => {\n    const { betAmount, ballCount } = this.state;\n    const acc = this.getCurrentAccount();\n    const totalCost = betAmount * ballCount;\n    if (!acc || !(betAmount > 0) || totalCost > acc.balance) return;\n    this.ensureAudio();\n    const { data: newBal, error } = await sb.rpc('player_place_bet', { p_account_id: acc.id, p_amount: totalCost });\n    if (error) return;\n    this.setState(s => ({ account: { ...s.account, balance: newBal } }));\n    this.refreshLeaderboard();\n    for (let i = 0; i < ballCount; i++){\n      setTimeout(() => {\n        this.balls.push({\n          x: this.width / 2 + (Math.random() - 0.5) * 6,\n          y: 14,\n          vx: (Math.random() - 0.5) * 1.4,\n          vy: 0,\n          r: this.ballRadius,\n          bet: betAmount,\n          color: this.pickBallColor()\n        });\n      }, i * 130);\n    }\n  };\n\n  stepPhysics(){\n    const substeps = 3;\n    const width = this.width, height = this.height;\n    for (let i = this.balls.length - 1; i >= 0; i--){\n      const ball = this.balls[i];\n      let landed = false;\n      if (ball.lastY === undefined) { ball.lastY = ball.y; ball.stuckFrames = 0; }\n      if (Math.abs(ball.y - ball.lastY) < 0.4 && ball.y < this.bucketTopY - 10){\n        ball.stuckFrames = (ball.stuckFrames || 0) + 1;\n      } else {\n        ball.stuckFrames = 0;\n      }\n      ball.lastY = ball.y;\n      if (ball.stuckFrames > 6){\n        ball.vx += (ball.x < this.width / 2 ? -1 : 1) * (1.5 + Math.random());\n        ball.vy += 2.5;\n        ball.stuckFrames = 0;\n      }\n      for (let s = 0; s < substeps; s++){\n        ball.vy += 0.06;\n        if (ball.vy > 6) ball.vy = 6;\n        ball.x += ball.vx / substeps * 1.6;\n        ball.y += ball.vy / substeps * 1.6;\n\n        if (ball.x - ball.r < 0){ ball.x = ball.r; ball.vx = Math.abs(ball.vx) * 0.78; }\n        if (ball.x + ball.r > width){ ball.x = width - ball.r; ball.vx = -Math.abs(ball.vx) * 0.78; }\n\n        for (const peg of this.pegs){\n          const dx = ball.x - peg.x, dy = ball.y - peg.y;\n          const dist = Math.hypot(dx, dy);\n          const minDist = ball.r + peg.r;\n          if (dist < minDist && dist > 0.001){\n            const nx = dx / dist, ny = dy / dist;\n            const overlap = minDist - dist;\n            ball.x += nx * overlap;\n            ball.y += ny * overlap;\n            const dot = ball.vx * nx + ball.vy * ny;\n            ball.vx -= 2 * dot * nx;\n            ball.vy -= 2 * dot * ny;\n            ball.vx *= 0.7; ball.vy *= 0.7;\n            ball.vx += (Math.random() - 0.5) * 0.4 + (ball.x < peg.x ? -0.12 : 0.12);\n            peg.hitTime = performance.now();\n            this.pegTick();\n          }\n        }\n\n        if (ball.y > this.bucketTopY){\n          for (const dx0 of this.dividerXs){\n            if (Math.abs(ball.x - dx0) < ball.r + 2){\n              const push = (ball.x < dx0) ? -1 : 1;\n              ball.x = dx0 + push * (ball.r + 2);\n              ball.vx = push * Math.abs(ball.vx || 1) * 0.5;\n            }\n          }\n        }\n\n        if (ball.y + ball.r >= height){\n          landed = true;\n          break;\n        }\n      }\n\n      if (landed){\n        const buckets = this.state.rows + 1;\n        let idx = buckets - 1;\n        for (let k = 0; k < buckets; k++){\n          if (ball.x < this.bucketBounds[k + 1]){ idx = k; break; }\n        }\n        const mult = this.multipliers[idx];\n        const win = Math.round(ball.bet * mult * 100) / 100;\n        this.flashes[idx] = performance.now();\n        this.landSound(mult);\n        this.balls.splice(i, 1);\n        const acc = this.getCurrentAccount();\n        if (acc){\n          sb.rpc('player_register_win', { p_account_id: acc.id, p_amount: win }).then(({ data: newBal, error }) => {\n            if (!error) this.setState(s => ({ account: s.account ? { ...s.account, balance: newBal } : s.account }));\n          });\n        }\n        this.setState(s => ({\n          history: [{ id: Date.now() + Math.random(), mult, win, bet: ball.bet }, ...s.history].slice(0, 14)\n        }));\n      }\n    }\n  }\n\n  draw(){\n    const canvas = this.canvasRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const th = this.theme();\n    const w = this.width, h = this.height;\n\n    const grad = ctx.createLinearGradient(0, 0, 0, h);\n    grad.addColorStop(0, th.bgTop);\n    grad.addColorStop(1, th.bgBottom);\n    ctx.fillStyle = grad;\n    ctx.fillRect(0, 0, w, h);\n\n    const now = performance.now();\n    for (const peg of this.pegs){\n      const hitAge = peg.hitTime ? now - peg.hitTime : 999;\n      const glowing = hitAge < 180;\n      ctx.beginPath();\n      ctx.arc(peg.x, peg.y, glowing ? peg.r * 1.5 : peg.r, 0, Math.PI * 2);\n      ctx.fillStyle = glowing ? th.pegGlow : th.peg;\n      ctx.shadowColor = th.pegGlow;\n      ctx.shadowBlur = glowing ? 14 : 4;\n      ctx.fill();\n    }\n    ctx.shadowBlur = 0;\n\n    const buckets = this.state.rows + 1;\n    for (let k = 0; k < buckets; k++){\n      const x0 = this.bucketBounds[k];\n      const bw = this.bucketBounds[k + 1] - x0;\n      const mult = this.multipliers[k];\n      const flashAge = this.flashes[k] ? now - this.flashes[k] : 999;\n      const flashing = flashAge < 260;\n      ctx.fillStyle = flashing ? 'rgba(255,255,255,0.9)' : multColor(mult);\n      ctx.globalAlpha = flashing ? 1 : 0.85;\n      const bh = h - this.bucketTopY;\n      ctx.fillRect(x0 + 2, this.bucketTopY, bw - 4, bh);\n      ctx.globalAlpha = 1;\n      ctx.fillStyle = '#1b1024';\n      ctx.font = '700 ' + Math.max(10, Math.min(bw * 0.32, 22)) + 'px Fredoka, sans-serif';\n      ctx.textAlign = 'center';\n      ctx.fillText(mult + 'x', x0 + bw / 2, this.bucketTopY + bh / 2 + 5);\n    }\n\n    ctx.strokeStyle = th.divider;\n    ctx.lineWidth = 2;\n    for (const dx0 of this.dividerXs){\n      ctx.beginPath();\n      ctx.moveTo(dx0, this.bucketTopY);\n      ctx.lineTo(dx0, h);\n      ctx.stroke();\n    }\n\n    for (const ball of this.balls){\n      ctx.beginPath();\n      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);\n      ctx.fillStyle = ball.color;\n      ctx.shadowColor = ball.color;\n      ctx.shadowBlur = 10;\n      ctx.fill();\n      ctx.shadowBlur = 0;\n    }\n  }\n\n  loop = () => {\n    if (!this.pegs || !this.multipliers || !this.bucketWidth){\n      this.rebuildBoard();\n    }\n    try {\n      this.stepPhysics();\n    } catch (e) {\n      console.error('PLINKO_STEP_ERROR', (e && e.stack) || e);\n    }\n    try {\n      this.draw();\n    } catch (e) {\n      console.error('PLINKO_DRAW_ERROR', (e && e.stack) || e);\n    }\n    this.raf = requestAnimationFrame(this.loop);\n  };\n\n  setSoundVolume = (v) => {\n    this.ensureAudio();\n    this.setState({ soundVolume: v });\n  };\n\n  onBetChange = (e) => {\n    const v = parseFloat(e.target.value);\n    this.setState({ betAmount: isNaN(v) ? 0 : Math.min(100000, Math.max(0, v)) });\n  };\n\n  setBet = (v) => this.setState({ betAmount: v });\n  setBallCount = (v) => this.setState({ ballCount: v });\n\n  segStyle(active){\n    return active\n      ? { bg: 'linear-gradient(135deg,#ffd23f,#ff9a3c)', color: '#1b1024', border: 'rgba(255,210,63,0.6)' }\n      : { bg: 'rgba(255,255,255,0.06)', color: 'rgba(255,255,255,0.65)', border: 'rgba(255,255,255,0.1)' };\n  }\n\n  renderVals(){\n    const { sessionId, account, loginName, loginPassword, loginError, betAmount, risk, rows, ballCount, soundVolume, history, theme, leaderboard, isMobile } = this.state;\n    const soundOptions = [{ v: 1, label: 'Full' }, { v: 0.4, label: 'Half' }, { v: 0, label: 'Muted' }].map(o => {\n      const s = this.segStyle(soundVolume === o.v);\n      return { key: o.label, label: o.label, bg: s.bg, color: s.color, border: s.border, onClick: () => this.setSoundVolume(o.v) };\n    });\n    const THEME_LABELS = { candy: 'Candy', neon: 'Neon', sunset: 'Sunset' };\n    const themeOptions = ['candy', 'neon', 'sunset'].map(k => {\n      const s = this.segStyle(theme === k);\n      return { key: k, label: THEME_LABELS[k], bg: s.bg, color: s.color, border: s.border, onClick: () => this.setTheme(k) };\n    });\n    const maskName = (name) => {\n      if (!name) return '';\n      if (name.length <= 2) return name[0] + '*';\n      return name.slice(0, 2) + '*'.repeat(Math.max(2, name.length - 2));\n    };\n    const leaderboardRows = (leaderboard || []).map((lb, i) => ({\n      key: lb.username + i,\n      rank: i + 1,\n      username: maskName(lb.username),\n      totalPlayedLabel: (Math.round(lb.total_played * 100) / 100).toFixed(2)\n    }));\n    const acc = account;\n    const balance = acc ? acc.balance : 0;\n    const totalCost = betAmount * ballCount;\n    const canDrop = !!acc && betAmount > 0 && totalCost <= balance;\n\n    const ballCountOptions = [1, 2, 3, 5, 10].map(n => {\n      const s = this.segStyle(ballCount === n);\n      return { key: n, label: String(n), bg: s.bg, color: s.color, border: s.border, onClick: () => this.setBallCount(n) };\n    });\n\n    const quickBets = [10, 25, 100, 500].map(v => ({ key: v, label: '🪙' + v, onClick: () => this.setBet(v) }));\n\n    const historyChips = history.map(h => ({\n      id: h.id,\n      multLabel: h.mult + 'x',\n      winLabel: (h.win >= h.bet ? '+' : '') + '🪙' + h.win.toFixed(2),\n      chipBg: h.mult >= 1 ? '#0d3a2e' : '#3a0d24',\n      chipBorder: h.mult >= 1 ? '#3cffa8' : '#ff3c9e',\n      chipText: h.mult >= 1 ? '#3cffa8' : '#ff6fb0'\n    }));\n\n    return {\n      outerPadding: isMobile ? '14px' : '28px',\n      headerDir: isMobile ? 'column' : 'row',\n      headerAlign: isMobile ? 'stretch' : 'center',\n      pillWidth: isMobile ? '100%' : 'auto',\n      pillJustify: isMobile ? 'space-between' : 'flex-start',\n      sidebarMaxWidth: isMobile ? '100%' : '340px',\n      showLogin: !acc,\n      showGame: !!acc,\n      loginName,\n      loginPassword,\n      loginError,\n      hasLoginError: !!loginError,\n      onLoginNameChange: this.onLoginNameChange,\n      onLoginPasswordChange: this.onLoginPasswordChange,\n      doLogin: this.doLogin,\n      doLogout: this.doLogout,\n      showPwModal: !!this.state.pwModal,\n      pwForced: !!this.state.pwForced,\n      showPwOldField: !this.state.pwForced,\n      pwModalTitle: this.state.pwForced ? 'Set Your Password' : 'Change Password',\n      pwCancelLabel: this.state.pwForced ? 'Later' : 'Cancel',\n      openPwModal: this.openPwModal,\n      closePwModal: this.closePwModal,\n      pwOld: this.state.pwOld || '',\n      pwNew: this.state.pwNew || '',\n      onPwOldChange: this.onPwOldChange,\n      onPwNewChange: this.onPwNewChange,\n      submitPwChange: this.submitPwChange,\n      hasPwMsg: !!this.state.pwMsg,\n      pwMsg: this.state.pwMsg || '',\n      pwMsgColor: this.state.pwMsgOk ? '#5cff9d' : '#ff8fa8',\n      canvasRef: this.canvasRef,\n      currentUsername: acc ? acc.name : '',\n      balanceDisplay: balance.toFixed(2),\n      betAmount,\n      onBetChange: this.onBetChange,\n      quickBets,\n      ballCountOptions,\n      soundOptions,\n      dropBalls: canDrop ? this.dropBalls : () => {},\n      dropLabel: canDrop ? ('Drop Ball' + (ballCount > 1 ? 's' : '') + ' — 🪙' + totalCost.toFixed(2)) : 'Insufficient Balance',\n      dropBg: canDrop ? 'linear-gradient(135deg,#ff6fb0,#7c5cff)' : 'rgba(255,255,255,0.08)',\n      dropColor: canDrop ? '#fff' : 'rgba(255,255,255,0.35)',\n      dropShadow: canDrop ? '0 8px 0 rgba(124,60,180,0.5), 0 14px 24px rgba(124,60,180,0.35)' : 'none',\n      dropCursor: canDrop ? 'pointer' : 'not-allowed',\n      history: historyChips,\n      historyEmpty: history.length === 0,\n      themeOptions,\n      leaderboard: leaderboardRows,\n      leaderboardEmpty: leaderboardRows.length === 0\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
